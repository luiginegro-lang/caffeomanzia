<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Caffeomanzia Cafausica</title>
<meta name="theme-color" content="#0a0a08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a08;--text:#d4d0c8;--text2:#8a8578;--accent:#c8a96e;--accent2:#a08050;--card-bg:rgba(22,22,20,.85);--border:#2a2824;--serif:'Cormorant Garamond',Georgia,serif}
html{font-size:16px}body{background:var(--bg);color:var(--text);font-family:var(--serif);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.75}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border)}

/* ANIMATED BG */
.bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-img{position:absolute;inset:-10%;width:120%;height:120%;object-fit:cover;opacity:0;transition:opacity 1.5s ease}
.bg-img.active{opacity:1}
.bg-img.img1{animation:ken1 30s ease-in-out infinite alternate}
.bg-img.img2{animation:ken2 35s ease-in-out infinite alternate}
@keyframes ken1{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.08) translate(-2%,1%)}}
@keyframes ken2{0%{transform:scale(1.05) translate(1%,-1%)}100%{transform:scale(1) translate(-1%,2%)}}
.bg-overlay{position:fixed;inset:0;z-index:1;background:linear-gradient(180deg,rgba(10,10,8,.3) 0%,rgba(10,10,8,.7) 40%,rgba(10,10,8,.92) 100%)}

/* SPLASH */
.splash{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;cursor:pointer}
.splash-title{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:300;letter-spacing:.15em;text-transform:uppercase;opacity:0;animation:fadeSlide 1.5s ease .3s forwards}
.splash-sub{font-size:clamp(.9rem,2.5vw,1.1rem);font-weight:300;font-style:italic;color:var(--text2);margin-top:12px;opacity:0;animation:fadeSlide 1.5s ease .8s forwards}
.splash-sep{color:var(--accent);font-size:1rem;letter-spacing:.5em;margin:40px 0;opacity:0;animation:fadeSlide 1s ease 1.2s forwards}
.splash-manual{font-size:clamp(.85rem,2vw,1rem);font-weight:300;font-style:italic;color:var(--text2);margin-bottom:6px;opacity:0;animation:fadeSlide 1.2s ease 1.5s forwards}
.splash-credit{font-size:.82rem;color:var(--text2);letter-spacing:.08em;margin-top:50px;opacity:0;animation:fadeSlide 1.2s ease 2s forwards}
.splash-enter{position:absolute;bottom:50px;font-size:.75rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;animation:pulse 3s ease-in-out infinite}

/* RECIPES MENU */
.recipes-menu{position:relative;z-index:2;min-height:100dvh;padding:80px 24px 60px;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:500px;margin:0 auto}
.recipes-label{font-size:.7rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:40px;text-align:center;opacity:0;animation:fadeSlide .8s ease .2s forwards}
.recipe-btn{width:100%;padding:20px 24px;margin-bottom:16px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;text-align:left;transition:all .3s ease;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);opacity:0;animation:fadeSlide .6s ease forwards}
.recipe-btn:nth-child(2){animation-delay:.3s}.recipe-btn:nth-child(3){animation-delay:.45s}.recipe-btn:nth-child(4){animation-delay:.6s}.recipe-btn:nth-child(5){animation-delay:.75s}
.recipe-btn:hover,.recipe-btn:active{border-color:var(--accent);transform:translateX(4px)}
.recipe-btn-num{font-size:.65rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;display:block;margin-bottom:4px}
.recipe-btn-name{font-size:clamp(1.1rem,3vw,1.3rem);font-weight:400;color:var(--text);display:block;margin-bottom:4px}
.recipe-btn-desc{font-size:.85rem;color:var(--text2);font-weight:300;font-style:italic}
.recipes-read{margin-top:40px;text-align:center;opacity:0;animation:fadeSlide .8s ease 1s forwards}
.recipes-read a{color:var(--accent);font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border-bottom:1px dotted var(--accent2);cursor:pointer;opacity:.6;transition:opacity .3s}
.recipes-read a:hover{opacity:1}

/* STEP VIEW */
.step-wrap{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;max-width:560px;margin:0 auto}
.step-label{font-size:.65rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px}
.step-phase{font-size:.7rem;color:var(--text2);letter-spacing:.1em;margin-bottom:24px}
.step-text{font-size:clamp(1.15rem,3.5vw,1.4rem);font-weight:300;line-height:1.7;color:var(--text);max-width:480px;opacity:0;animation:fadeSlide .5s ease forwards}
.step-note{font-size:.9rem;color:var(--text2);font-style:italic;margin-top:16px;font-weight:300;opacity:0;animation:fadeSlide .5s ease .2s forwards}
.step-nav{display:flex;gap:20px;margin-top:50px;align-items:center}
.step-nav button{background:none;border:1px solid var(--border);color:var(--accent);font-family:var(--serif);font-size:.8rem;padding:10px 20px;border-radius:6px;cursor:pointer;letter-spacing:.1em;transition:all .3s}
.step-nav button:hover{border-color:var(--accent)}
.step-nav button.primary{background:rgba(200,169,110,.1);border-color:var(--accent)}
.step-dots{display:flex;gap:6px;margin-top:20px}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .3s}
.step-dot.active{background:var(--accent);transform:scale(1.3)}
.step-back-menu{margin-top:30px;opacity:.5}
.step-back-menu a{color:var(--text2);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;cursor:pointer}

/* READ VIEW */
.read-wrap{position:relative;z-index:2;padding:40px 24px 80px;max-width:640px;margin:0 auto}
.read-wrap .section-num{font-size:.7rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
.read-wrap .section-title{font-size:clamp(1.3rem,4vw,1.7rem);font-weight:400;margin-bottom:40px;line-height:1.3}
.read-wrap p{font-size:clamp(1rem,2.5vw,1.1rem);margin-bottom:1.4em;font-weight:300}
.read-wrap .bold-lead{font-weight:500}
.read-wrap .ital{font-style:italic;color:var(--text2);margin-bottom:1.8em}
.read-wrap .sep{text-align:center;color:var(--accent);letter-spacing:.5em;margin:2.5em 0;font-size:.9rem}
.read-wrap .subhead{font-size:clamp(1.1rem,3vw,1.2rem);font-weight:500;margin:2.5em 0 1em}
.read-wrap .verse{font-style:italic;color:var(--text2);margin-bottom:.5em;padding-left:1em}
.read-back{position:sticky;top:0;z-index:10;background:rgba(10,10,8,.85);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);padding:12px 0;margin-bottom:20px;border-bottom:1px solid var(--border)}
.read-back a{color:var(--accent);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;cursor:pointer}
.fn-trigger{color:var(--accent);cursor:pointer;border-bottom:1px dotted var(--accent2);font-style:italic}
.fn-body{overflow:hidden;max-height:0;opacity:0;margin:0;font-size:.88rem;color:var(--text2);padding-left:1em;border-left:2px solid var(--border);font-weight:300;line-height:1.6;transition:max-height .4s,opacity .3s,margin .3s}
.fn-body.open{max-height:200px;opacity:1;margin:.6em 0 1em}

/* VOCAB */
.vocab-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--card-bg);border:1px solid var(--border);color:var(--accent);font-size:1.1rem;cursor:pointer;z-index:100;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:300;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:all .3s}
.vocab-btn:hover{background:var(--border)}
.vocab-overlay{position:fixed;inset:0;background:rgba(10,10,8,.95);z-index:200;overflow-y:auto;padding:60px 24px;opacity:0;pointer-events:none;transition:opacity .4s;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.vocab-overlay.open{opacity:1;pointer-events:auto}
.vocab-close{position:fixed;top:20px;right:24px;color:var(--text2);font-size:1.5rem;cursor:pointer;z-index:210;background:none;border:none;font-family:var(--serif)}
.vocab-inner{max-width:600px;margin:0 auto}
.vocab-title{font-size:.75rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:32px;text-align:center}
.vocab-item{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.vocab-item:last-child{border-bottom:none}
.vocab-term{font-size:1.1rem;font-weight:500;margin-bottom:6px}
.vocab-def{font-size:.92rem;font-weight:300;color:var(--text2);line-height:1.7}

@keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.7}}
.fade-in{animation:fadeSlide .5s ease forwards}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
const e=React.createElement,{useState,useEffect,useCallback}=React;

// STEPS DATA
const RECIPES=[
{id:"sacrificale",num:"I",name:"Il Caff\u00e8 Sacrificale",desc:"Lettura pura. Non si beve. Pratica solitaria.",
steps:[
{phase:"Preparazione",text:"Prendi il caff\u00e8 esausto. Chicchi specialty invecchiati, buste dimenticate, lotti rifiutati. Caff\u00e8 che ha perso la sua destinazione."},
{phase:"Preparazione",text:"Pesa 25 grammi di chicchi."},
{phase:"Preparazione",text:"Macina medio-grosso con macinino manuale. I chicchi vecchi e fragili produrranno naturalmente fines \u2014 polvere ultrafine. Questa fragilit\u00e0 \u00e8 la risorsa della ricetta."},
{phase:"Preparazione",text:"Scalda 150 ml di acqua a 90\u201395\u00b0C. Appena sotto il bollore."},
{phase:"Infusione",text:"Versa l\u2019acqua calda sulla macinatura, direttamente in una tazza o ciotola."},
{phase:"Infusione",text:"Copri con un piattino."},
{phase:"Infusione",text:"Cinque minuti. In silenzio.",note:"Il silenzio \u00e8 parte della ricetta. Il Caff\u00e8 Sacrificale si prepara senza parlare."},
{phase:"Colatura",text:"Lascia intiepidire il caff\u00e8 fino a quando \u00e8 maneggiabile."},
{phase:"Colatura",text:"Prepara un foglio di carta per acquerello bianca, almeno 200 g/m\u00b2. Pi\u00f9 alta la grammatura, pi\u00f9 lenta l\u2019assorbenza, pi\u00f9 ricche le figure."},
{phase:"Colatura",text:"Versa tutto \u2014 liquido e fondo \u2014 al centro della carta. Un gesto unico e deciso. Non distribuire, non spalmare. La materia si espande da sola per capillarit\u00e0."},
{phase:"Attesa",text:"Attendi che asciughi. Da venti minuti a un\u2019ora. Il monotipo si forma da solo."},
{phase:"Lettura",text:"Osserva il monotipo. Densit\u00e0 e rarefazione, centro e periferia, continuit\u00e0 e frattura, bordi, velocit\u00e0, residui.",note:"Il bottone V in basso a destra apre il vocabolario della lettura."},
{phase:"Archivio",text:"Annota sul retro: la data, il caff\u00e8 utilizzato, una parola o frase. Conserva la carta. Nel tempo, l\u2019archivio diventa un diario cafausico."},
]},
{id:"parlante",num:"II",name:"Il Caff\u00e8 Parlante",desc:"Si beve e si legge. Pratica conviviale.",
steps:[
{phase:"Preparazione",text:"Caff\u00e8 esausto, come per il Sacrificale. Pi\u00f9 aromatiche: scorza di limone o arancia secca, anice stellato, cannella, verbena, cardamomo, chiodi di garofano."},
{phase:"Preparazione",text:"Pesa 25 grammi di caff\u00e8 e 3\u20135 grammi di aromatiche."},
{phase:"Preparazione",text:"Macina medio-grosso. Mescola caff\u00e8 e aromatiche."},
{phase:"Preparazione",text:"Scalda 250 ml di acqua a 90\u201395\u00b0C."},
{phase:"Estrazione",text:"Carica il cestello filtro della cuccumella con caff\u00e8 e aromatiche mescolati."},
{phase:"Estrazione",text:"La cuccumella al contrario: non capovolgere. Versa l\u2019acqua calda direttamente nel serbatoio superiore. L\u2019acqua scende per gravit\u00e0 \u2014 un pour-over lento con filtro metallico.",note:"Il gesto fondamentale della cuccumella \u2014 rovesciare il mondo \u2014 viene sospeso."},
{phase:"La doppia tazza",text:"Prima met\u00e0 del caff\u00e8: filtra attraverso un filtro di carta (V60, Chemex, o un filtro da supermercato su un colino). Questo \u00e8 il caff\u00e8 da bere \u2014 pulito, aromatizzato."},
{phase:"La doppia tazza",text:"Seconda met\u00e0 \u2014 pi\u00f9 densa, pi\u00f9 carica: versa direttamente in un\u2019altra tazza senza filtrare. Questa \u00e8 la tazza della lettura.",note:"La carta filtrante \u00e8 la soglia che separa il piacere dalla divinazione."},
{phase:"Il rito",text:"Bevete insieme la prima tazza. Parlate, state, ascoltate. Le parole dette mentre si beve sono il contesto della lettura."},
{phase:"Lettura",text:"Quando la prima tazza \u00e8 finita, il consultante beve lentamente il caff\u00e8 torbido della seconda tazza fino all\u2019ultimo terzo."},
{phase:"Lettura",text:"Capovolgi la tazza sul piattino. Attendi tre-cinque minuti. Oppure versa l\u2019ultimo terzo su carta assorbente."},
{phase:"Lettura",text:"Leggi a voce, in dialogo. Descrivi le relazioni spaziali, le densit\u00e0, i vuoti. Chi consulta risponde. La lettura si costruisce insieme.",note:"Figure pi\u00f9 rade e ariose del caff\u00e8 turco. Pi\u00f9 spazio bianco. Figure fatte pi\u00f9 di assenza che di presenza."},
]},
{id:"soglia",num:"III",name:"Il Caff\u00e8 della Soglia",desc:"La lettura \u00e8 nel tempo. Pratica dell\u2019ascolto.",
steps:[
{phase:"Preparazione",text:"Caff\u00e8 esausto pi\u00f9 un ingrediente secco: buccia d\u2019arancia secca a pezzetti, fiori di camomilla, cardamomo frantumato, o petali di rosa secchi."},
{phase:"Preparazione",text:"Pesa 25 grammi di caff\u00e8 e 5\u20138 grammi di materiale secco."},
{phase:"Preparazione",text:"Macina medio-fine, pi\u00f9 fine del normale. Serve aumentare la resistenza al passaggio dell\u2019acqua."},
{phase:"Preparazione",text:"Scalda 200 ml di acqua fino al bollore, 100\u00b0C."},
{phase:"Estrazione",text:"Carica il cestello filtro della cuccumella con caff\u00e8 e materiale secco mescolati, ben pressati."},
{phase:"Estrazione",text:"Riempi il serbatoio con l\u2019acqua bollente. Capovolgi."},
{phase:"Estrazione",text:"Prepara il telefono per registrare l\u2019audio. Avvia la registrazione."},
{phase:"L\u2019ascolto",text:"Ascolta senza guardare. Il gocciolio sar\u00e0 irregolare: rapido all\u2019inizio, poi pi\u00f9 lento, con pause, riprese, silenzi lunghi.",note:"L\u2019estrazione durer\u00e0 dai venti ai quaranta minuti. Forse di pi\u00f9."},
{phase:"L\u2019ascolto",text:"Presta attenzione al ritmo. Le accelerazioni, i rallentamenti, le pause. Il momento in cui il ritmo cambia. Il silenzio \u2014 quando sembra finito, e poi riprende."},
{phase:"L\u2019ascolto",text:"Nota l\u2019ultima goccia. Quella dopo la quale il silenzio diventa definitivo."},
{phase:"Lettura",text:"La lettura \u00e8 gi\u00e0 avvenuta. Ci\u00f2 che hai percepito durante l\u2019attesa \u2014 se il ritmo era rassicurante o inquietante, se le pause erano piacevoli o angoscianti \u2014 queste percezioni sono la lettura."},
{phase:"Archivio",text:"Ferma la registrazione. Il file sonoro \u00e8 un documento oracolare: un ritratto acustico di quel momento. Conservalo."},
]},
{id:"incontro",num:"IV",name:"Il Caff\u00e8 dell\u2019Incontro",desc:"Due assenze nella French press. Si beve.",
steps:[
{phase:"",text:"Un caff\u00e8 monorigine specialty, trenta-quarantacinque giorni dopo la tostatura, non \u00e8 morto. Ha perso la voce. L\u2019individuo \u00e8 diventato categoria. Il vuoto c\u2019\u00e8, ma \u00e8 un vuoto sordo.",note:"Il Caff\u00e8 dell\u2019Incontro \u00e8 possibile solo come protesi \u2014 solo quando il caff\u00e8 ha gi\u00e0 attraversato la soglia."},
{phase:"Preparazione",text:"Pesa 35 grammi di caff\u00e8 esausto. Monorigine che \u00e8 stato buono \u2014 la sua assenza \u00e8 tanto pi\u00f9 significativa quanto pi\u00f9 la sua presenza era stata eloquente."},
{phase:"Preparazione",text:"Macina grosso, da French press. Comandante C40: 28\u201330 click."},
{phase:"Preparazione",text:"Scegli una sola aromatica. Buccia d\u2019arancia essiccata (due o tre pezzi) oppure un baccello di cardamomo verde, leggermente schiacciato.",note:"Evitare cannella, anice stellato, vaniglia. Troppo dominanti. Chiudono il discorso."},
{phase:"Preparazione",text:"Scalda 500 ml di acqua a 90\u201392\u00b0C. Non di pi\u00f9."},
{phase:"Infusione",text:"Versa l\u2019acqua sul caff\u00e8 macinato nella French press."},
{phase:"Infusione",text:"Quattro minuti. Senza le aromatiche. In questi quattro minuti il caff\u00e8 \u00e8 solo con s\u00e9 stesso, nella sua esaustione."},
{phase:"L\u2019incontro",text:"Allo scadere dei quattro minuti, aggiungi le aromatiche. Un solo minuto.",note:"Aggiunte nell\u2019ultimo minuto producono un passaggio aromatico, non un\u2019occupazione. Un fantasma, non una presenza piena."},
{phase:"L\u2019incontro",text:"Premi lo stantuffo. Versa."},
{phase:"",text:"Bevi lentamente. Quello che incontri in tazza non \u00e8 caff\u00e8 e non \u00e8 tisana. Il caff\u00e8 \u00e8 il letto, la spezia \u00e8 il sogno. Nessuno dei due finge di essere l\u2019altro."},
]},
];

const VOCAB=[
{term:"Densit\u00e0 e rarefazione",def:"Accumulazione vs dispersione. Macchia densa: qualcosa si \u00e8 raccolto. Rarefazione: leggerezza o esaurimento. Questa concentrazione \u00e8 risorsa o peso?"},
{term:"Centro e periferia",def:"Centro pieno: interiorit\u00e0, protezione. Bordi densi: proiezione verso fuori. Centro vuoto con bordi densi: qualcosa tiene dall\u2019esterno."},
{term:"Continuit\u00e0 e frattura",def:"Macchia continua: coerenza. Frammentata: discontinuit\u00e0 o molteplicit\u00e0. La frattura pu\u00f2 essere ferita o apertura."},
{term:"Direzione e simmetria",def:"Espansione asimmetrica: una spinta prevalente. Simmetria: equilibrio o stallo."},
{term:"Bordi netti e sfumati",def:"Il bordo \u00e8 una soglia. Netto: chiarezza tra dentro e fuori. Sfumato: permeabilit\u00e0."},
{term:"Velocit\u00e0",def:"Bordi filiformi: urgenza, impulso. Bordi compatti e rotondi: pazienza, sedimentazione."},
{term:"Residui e isole",def:"Depositi isolati: pensieri ricorrenti, possibilit\u00e0 accantonate, cose in sospeso."},
];

const FOOTNOTES={
"cezve":"Piccolo bricco in rame, usato per il caff\u00e8 turco.",
"cuccumella":"Caffettiera napoletana a ribaltamento con cestello filtro.",
"specialty coffee":"Caff\u00e8 valutato almeno 80/100 secondo la SCA.",
"monotipo":"Stampa che produce un\u2019unica copia irripetibile.",
"capillarit\u00e0":"Migrazione spontanea del liquido attraverso materiali porosi.",
"pour-over":"Acqua versata manualmente sul caff\u00e8 attraverso un filtro.",
"V60":"Dripper conico Hario per filtrazione manuale.",
"Chemex":"Caffettiera a clessidra con filtro di carta spesso.",
"melanoidini":"Polimeri bruni dalla reazione di Maillard. Corpo e colore del caff\u00e8.",
"terroir":"Condizioni ambientali che conferiscono al caff\u00e8 il suo carattere aromatico.",
"limonene":"Terpene volatile nella buccia degli agrumi.",
"cinnamaldeide":"Composto volatile dominante della cannella.",
"vanillina":"Composto aromatico principale della vaniglia.",
"French press":"Caffettiera a stantuffo con filtro metallico.",
"Comandante C40":"Macinino manuale tedesco a mole coniche di precisione.",
};

// COMPONENTS
function BgImages({active}){
  return e("div",{className:"bg-wrap"},
    e("img",{src:"img1.png",className:"bg-img img1"+(active===1?" active":""),alt:""}),
    e("img",{src:"img2.png",className:"bg-img img2"+(active===2?" active":""),alt:""}),
    e("div",{className:"bg-overlay"})
  );
}

function VocabOverlay({open,onClose}){
  return e("div",{className:"vocab-overlay"+(open?" open":"")},
    e("button",{className:"vocab-close",onClick:onClose},"\u00d7"),
    e("div",{className:"vocab-inner"},
      e("div",{className:"vocab-title"},"Vocabolario della lettura"),
      VOCAB.map(function(v,i){return e("div",{key:i,className:"vocab-item"},e("div",{className:"vocab-term"},v.term),e("div",{className:"vocab-def"},v.def))})
    )
  );
}

function Fn({term,children}){
  var s=useState(false),o=s[0],set=s[1];
  return e("span",null,
    e("span",{className:"fn-trigger",onClick:function(){set(!o)}},children||term),
    e("div",{className:"fn-body"+(o?" open":"")},FOOTNOTES[term]||"")
  );
}
function renderText(text){
  if(!text)return null;
  var parts=text.split(/\{([^}]+)\}/g);
  return parts.map(function(p,i){return i%2===0?p:e(Fn,{key:i,term:p},p)});
}

// STEP VIEW
function StepView({recipe,onBack}){
  var s=useState(0),idx=s[0],setIdx=s[1];
  var steps=recipe.steps;
  var step=steps[idx];

  useEffect(function(){window.scrollTo(0,0)},[idx]);

  return e("div",{className:"step-wrap",key:idx},
    e("div",{className:"step-label"},recipe.name),
    step.phase?e("div",{className:"step-phase"},step.phase):null,
    e("div",{className:"step-text fade-in",key:"t"+idx},step.text),
    step.note?e("div",{className:"step-note fade-in",key:"n"+idx},step.note):null,
    e("div",{className:"step-nav"},
      idx>0?e("button",{onClick:function(){setIdx(idx-1)}},"\u2190"):null,
      idx<steps.length-1?e("button",{className:"primary",onClick:function(){setIdx(idx+1)}},"\u2192"):
        e("button",{onClick:onBack},"Fine")
    ),
    e("div",{className:"step-dots"},steps.map(function(_,i){
      return e("div",{key:i,className:"step-dot"+(i===idx?" active":"")})
    })),
    e("div",{className:"step-back-menu"},e("a",{onClick:onBack},"Torna alle ricette"))
  );
}

// APP
function App(){
  var vs=useState("splash"),view=vs[0],setView=vs[1];
  var rs=useState(null),recipe=rs[0],setRecipe=rs[1];
  var vo=useState(false),vocabOpen=vo[0],setVocab=vo[1];
  var bgImg=view==="splash"?1:2;

  function goRecipe(r){setRecipe(r);setView("steps");window.scrollTo(0,0);}
  function goMenu(){setView("menu");setRecipe(null);window.scrollTo(0,0);}

  // SPLASH
  if(view==="splash"){
    return e("div",null,
      e(BgImages,{active:1}),
      e("div",{className:"splash",onClick:function(){setView("menu")}},
        e("div",{className:"splash-title"},"Caffeomanzia Cafausica"),
        e("div",{className:"splash-sub"},"documenti"),
        e("div",{className:"splash-sep"},"\u2014 \u2022 \u2014"),
        e("div",{className:"splash-manual"},"Un manuale di pratica oracolare"),
        e("div",{className:"splash-manual"},"per caff\u00e8 che hanno perso la loro destinazione"),
        e("div",{className:"splash-credit"},"Lu Cafausu / Casa Cafausica / Fondazione Lac o Le Mon"),
        e("div",{className:"splash-enter"},"tocca per entrare")
      )
    );
  }

  // MENU
  if(view==="menu"){
    return e("div",null,
      e(BgImages,{active:2}),
      e("div",{className:"recipes-menu"},
        e("div",{className:"recipes-label"},"Scegli il rituale"),
        RECIPES.map(function(r,i){
          return e("div",{key:i,className:"recipe-btn",onClick:function(){goRecipe(r)}},
            e("span",{className:"recipe-btn-num"},r.num+"."),
            e("span",{className:"recipe-btn-name"},r.name),
            e("span",{className:"recipe-btn-desc"},r.desc)
          );
        })
      ),
      e("button",{className:"vocab-btn",onClick:function(){setVocab(true)}},"V"),
      e(VocabOverlay,{open:vocabOpen,onClose:function(){setVocab(false)}})
    );
  }

  // STEPS
  if(view==="steps"&&recipe){
    return e("div",null,
      e(BgImages,{active:1}),
      e(StepView,{recipe:recipe,onBack:goMenu}),
      e("button",{className:"vocab-btn",onClick:function(){setVocab(true)}},"V"),
      e(VocabOverlay,{open:vocabOpen,onClose:function(){setVocab(false)}})
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
