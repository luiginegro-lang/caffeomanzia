<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>Caffeomanzia Cafausica</title>
<meta name="theme-color" content="#0a0a08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a08;--text:#ddd8d0;--text2:#a09a8e;--accent:#c8a96e;--accent2:#a08050;--card-bg:rgba(22,22,20,.88);--border:#2a2824;--serif:'Cormorant Garamond',Georgia,serif}
html{font-size:18px}
body{background:var(--bg);color:var(--text);font-family:var(--serif);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.8}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border)}

/* ANIMATED BG */
.bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-img{position:absolute;inset:-8%;width:116%;height:116%;object-fit:cover;opacity:0;transition:opacity 1.8s ease}
.bg-img.active{opacity:1}
.bg-img.img1{animation:ken1 30s ease-in-out infinite alternate}
.bg-img.img2{animation:ken2 35s ease-in-out infinite alternate}
@keyframes ken1{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.06) translate(-1.5%,1%)}}
@keyframes ken2{0%{transform:scale(1.04) translate(1%,-1%)}100%{transform:scale(1) translate(-1%,1.5%)}}
.bg-overlay{position:fixed;inset:0;z-index:1;background:linear-gradient(180deg,rgba(10,10,8,.25) 0%,rgba(10,10,8,.65) 35%,rgba(10,10,8,.93) 100%)}

/* TOP BAR — always visible except splash */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:50;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,8,.8);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.top-back{color:var(--accent);font-size:1rem;letter-spacing:.08em;cursor:pointer;background:none;border:none;font-family:var(--serif);padding:6px 12px;border-radius:6px;transition:background .3s}
.top-back:hover{background:rgba(200,169,110,.1)}
.top-vocab{color:var(--accent);font-size:.9rem;letter-spacing:.08em;cursor:pointer;background:none;border:1px solid var(--border);font-family:var(--serif);padding:6px 14px;border-radius:6px;transition:all .3s}
.top-vocab:hover{border-color:var(--accent);background:rgba(200,169,110,.1)}

/* SPLASH */
.splash{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;cursor:pointer}
.splash-title{font-size:clamp(1.8rem,6vw,2.8rem);font-weight:300;letter-spacing:.12em;text-transform:uppercase;opacity:0;animation:fadeSlide 1.5s ease .3s forwards}
.splash-sub{font-size:clamp(1.1rem,3vw,1.3rem);font-weight:300;font-style:italic;color:var(--text2);margin-top:14px;opacity:0;animation:fadeSlide 1.5s ease .8s forwards}
.splash-sep{color:var(--accent);font-size:1.1rem;letter-spacing:.5em;margin:44px 0;opacity:0;animation:fadeSlide 1s ease 1.2s forwards}
.splash-manual{font-size:clamp(1rem,2.5vw,1.15rem);font-weight:300;font-style:italic;color:var(--text2);margin-bottom:8px;opacity:0;animation:fadeSlide 1.2s ease 1.5s forwards}
.splash-credit{font-size:1rem;color:var(--text2);letter-spacing:.06em;margin-top:60px;opacity:0;animation:fadeSlide 1.2s ease 2s forwards}
.splash-enter{position:absolute;bottom:50px;font-size:.95rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;animation:pulse 3s ease-in-out infinite}

/* RECIPES MENU */
.recipes-menu{position:relative;z-index:2;min-height:100dvh;padding:90px 24px 60px;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:540px;margin:0 auto}
.recipes-label{font-size:1rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:36px;text-align:center;opacity:0;animation:fadeSlide .8s ease .2s forwards}
.recipe-btn{width:100%;padding:22px 24px;margin-bottom:18px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;cursor:pointer;text-align:left;transition:all .3s ease;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);opacity:0;animation:fadeSlide .6s ease forwards}
.recipe-btn:nth-child(2){animation-delay:.3s}.recipe-btn:nth-child(3){animation-delay:.45s}.recipe-btn:nth-child(4){animation-delay:.6s}.recipe-btn:nth-child(5){animation-delay:.75s}
.recipe-btn:hover,.recipe-btn:active{border-color:var(--accent);transform:translateX(4px)}
.recipe-btn-num{font-size:.85rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:6px}
.recipe-btn-name{font-size:clamp(1.25rem,3.5vw,1.5rem);font-weight:400;color:var(--text);display:block;margin-bottom:6px}
.recipe-btn-desc{font-size:1rem;color:var(--text2);font-weight:300;font-style:italic}

/* STEP VIEW */
.step-wrap{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 28px 60px;text-align:center;max-width:600px;margin:0 auto}
.step-label{font-size:1rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px}
.step-phase{font-size:.95rem;color:var(--text2);letter-spacing:.08em;margin-bottom:28px;text-transform:uppercase}
.step-text{font-size:clamp(1.2rem,3.5vw,1.5rem);font-weight:300;line-height:1.75;color:var(--text);max-width:520px;opacity:0;animation:fadeSlide .5s ease forwards}
.step-note{font-size:clamp(1rem,2.5vw,1.15rem);color:var(--text2);font-style:italic;margin-top:20px;font-weight:300;line-height:1.7;opacity:0;animation:fadeSlide .5s ease .2s forwards}
.step-nav{display:flex;gap:24px;margin-top:50px;align-items:center}
.step-nav button{background:none;border:1px solid var(--border);color:var(--accent);font-family:var(--serif);font-size:1.05rem;padding:12px 28px;border-radius:8px;cursor:pointer;letter-spacing:.08em;transition:all .3s}
.step-nav button:hover{border-color:var(--accent)}
.step-nav button.primary{background:rgba(200,169,110,.12);border-color:var(--accent)}
.step-dots{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;justify-content:center}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s}
.step-dot.active{background:var(--accent);transform:scale(1.4)}
.step-counter{margin-top:16px;font-size:1rem;color:var(--text2)}

/* VOCAB */
.vocab-overlay{position:fixed;inset:0;background:rgba(10,10,8,.96);z-index:200;overflow-y:auto;padding:80px 28px 60px;opacity:0;pointer-events:none;transition:opacity .4s;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.vocab-overlay.open{opacity:1;pointer-events:auto}
.vocab-close{position:fixed;top:18px;right:24px;color:var(--text2);font-size:1.8rem;cursor:pointer;z-index:210;background:none;border:none;font-family:var(--serif)}
.vocab-inner{max-width:600px;margin:0 auto}
.vocab-title{font-size:1rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:36px;text-align:center}
.vocab-item{margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid var(--border)}
.vocab-item:last-child{border-bottom:none}
.vocab-term{font-size:1.3rem;font-weight:500;margin-bottom:10px}
.vocab-def{font-size:1.1rem;font-weight:300;color:var(--text2);line-height:1.8}

/* READ VIEW */
.read-wrap{position:relative;z-index:2;padding:90px 28px 80px;max-width:660px;margin:0 auto}
.read-wrap .section-title{font-size:clamp(1.4rem,4vw,1.8rem);font-weight:400;margin-bottom:36px;line-height:1.4}
.read-wrap p{font-size:clamp(1.05rem,2.5vw,1.2rem);margin-bottom:1.5em;font-weight:300;line-height:1.85}
.read-wrap .bold-lead{font-weight:500}
.read-wrap .ital{font-style:italic;color:var(--text2)}
.read-wrap .sep{text-align:center;color:var(--accent);letter-spacing:.5em;margin:2.5em 0}
.read-wrap .subhead{font-size:clamp(1.15rem,3vw,1.35rem);font-weight:500;margin:2.5em 0 1em}
.read-wrap .verse{font-style:italic;color:var(--text2);margin-bottom:.6em;padding-left:1em}
.fn-trigger{color:var(--accent);cursor:pointer;border-bottom:1px dotted var(--accent2);font-style:italic}
.fn-body{overflow:hidden;max-height:0;opacity:0;margin:0;font-size:1rem;color:var(--text2);padding-left:1em;border-left:2px solid var(--border);font-weight:300;line-height:1.7;transition:max-height .4s,opacity .3s,margin .3s}
.fn-body.open{max-height:250px;opacity:1;margin:.8em 0 1.2em}

@keyframes fadeSlide{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.75}}
.fade-in{animation:fadeSlide .5s ease forwards}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
const e=React.createElement,{useState,useEffect}=React;

const RECIPES=[
{id:"sacrificale",num:"I",name:"Il Caff\u00e8 Sacrificale",desc:"Lettura pura. Non si beve. Pratica solitaria.",
steps:[
{phase:"Preparazione",text:"Prendi il caff\u00e8 esausto. Chicchi specialty invecchiati, buste dimenticate, lotti rifiutati. Caff\u00e8 che ha perso la sua destinazione."},
{phase:"Preparazione",text:"Pesa 25 grammi di chicchi."},
{phase:"Preparazione",text:"Macina medio-grosso con macinino manuale. I chicchi vecchi e fragili produrranno naturalmente fines \u2014 polvere ultrafine. Questa fragilit\u00e0 \u00e8 la risorsa della ricetta."},
{phase:"Preparazione",text:"Scalda 150 ml di acqua a 90\u201395\u00b0C. Appena sotto il bollore."},
{phase:"Infusione",text:"Versa l\u2019acqua calda sulla macinatura, direttamente in una tazza o ciotola."},
{phase:"Infusione",text:"Copri con un piattino."},
{phase:"Infusione",text:"Cinque minuti. In silenzio.",note:"Il silenzio \u00e8 parte della ricetta. Il Caff\u00e8 Sacrificale si prepara senza parlare."},
{phase:"Colatura",text:"Lascia intiepidire il caff\u00e8 fino a quando \u00e8 maneggiabile."},
{phase:"Colatura",text:"Prepara un foglio di carta per acquerello bianca, almeno 200 g/m\u00b2. Pi\u00f9 alta la grammatura, pi\u00f9 lenta l\u2019assorbenza, pi\u00f9 ricche le figure."},
{phase:"Colatura",text:"Versa tutto \u2014 liquido e fondo \u2014 al centro della carta. Un gesto unico e deciso. Non distribuire, non spalmare. La materia si espande da sola."},
{phase:"Attesa",text:"Attendi che asciughi. Da venti minuti a un\u2019ora. Il monotipo si forma da solo."},
{phase:"Lettura",text:"Osserva il monotipo. Densit\u00e0 e rarefazione, centro e periferia, continuit\u00e0 e frattura, bordi, velocit\u00e0, residui.",note:"Tocca \u201cVocabolario\u201d in alto a destra per la guida alla lettura."},
{phase:"Archivio",text:"Annota sul retro: la data, il caff\u00e8 utilizzato, una parola o frase. Conserva la carta. Nel tempo, l\u2019archivio diventa un diario cafausico."},
]},
{id:"parlante",num:"II",name:"Il Caff\u00e8 Parlante",desc:"Si beve e si legge. Pratica conviviale.",
steps:[
{phase:"Preparazione",text:"Caff\u00e8 esausto, come per il Sacrificale. Pi\u00f9 aromatiche a scelta: scorza di limone o arancia secca, anice stellato, cannella, verbena, cardamomo, chiodi di garofano."},
{phase:"Preparazione",text:"Pesa 25 grammi di caff\u00e8 e 3\u20135 grammi di aromatiche."},
{phase:"Preparazione",text:"Macina medio-grosso. Mescola caff\u00e8 e aromatiche."},
{phase:"Preparazione",text:"Scalda 250 ml di acqua a 90\u201395\u00b0C."},
{phase:"Estrazione",text:"Carica il cestello filtro della cuccumella con caff\u00e8 e aromatiche mescolati."},
{phase:"Estrazione",text:"La cuccumella al contrario: non capovolgere. Versa l\u2019acqua calda direttamente nel serbatoio superiore. L\u2019acqua scende per gravit\u00e0.",note:"Il gesto fondamentale della cuccumella \u2014 rovesciare il mondo \u2014 viene sospeso."},
{phase:"La doppia tazza",text:"Prima met\u00e0 del caff\u00e8: filtra attraverso un filtro di carta (V60, Chemex, o filtro da supermercato su un colino). Questo \u00e8 il caff\u00e8 da bere."},
{phase:"La doppia tazza",text:"Seconda met\u00e0 \u2014 pi\u00f9 densa, pi\u00f9 carica: versa direttamente in un\u2019altra tazza senza filtrare. Questa \u00e8 la tazza della lettura.",note:"La carta filtrante \u00e8 la soglia che separa il piacere dalla divinazione."},
{phase:"Il rito",text:"Bevete insieme la prima tazza. Parlate, state, ascoltate. Le parole dette mentre si beve sono il contesto della lettura."},
{phase:"Lettura",text:"Quando la prima tazza \u00e8 finita, il consultante beve lentamente il caff\u00e8 torbido della seconda tazza fino all\u2019ultimo terzo."},
{phase:"Lettura",text:"Capovolgi la tazza sul piattino. Attendi tre-cinque minuti. Oppure versa l\u2019ultimo terzo su carta assorbente."},
{phase:"Lettura",text:"Leggi a voce, in dialogo. Descrivi le relazioni spaziali, le densit\u00e0, i vuoti. Chi consulta risponde. La lettura si costruisce insieme.",note:"Figure pi\u00f9 rade del caff\u00e8 turco. Pi\u00f9 spazio bianco. Figure fatte pi\u00f9 di assenza che di presenza."},
]},
{id:"soglia",num:"III",name:"Il Caff\u00e8 della Soglia",desc:"La lettura \u00e8 nel tempo. Pratica dell\u2019ascolto.",
steps:[
{phase:"Preparazione",text:"Caff\u00e8 esausto pi\u00f9 un ingrediente secco: buccia d\u2019arancia secca a pezzetti, fiori di camomilla, cardamomo frantumato, o petali di rosa secchi."},
{phase:"Preparazione",text:"Pesa 25 grammi di caff\u00e8 e 5\u20138 grammi di materiale secco."},
{phase:"Preparazione",text:"Macina medio-fine, pi\u00f9 fine del normale. Serve aumentare la resistenza al passaggio dell\u2019acqua."},
{phase:"Preparazione",text:"Scalda 200 ml di acqua fino al bollore, 100\u00b0C."},
{phase:"Estrazione",text:"Carica il cestello filtro della cuccumella con caff\u00e8 e materiale secco mescolati, ben pressati."},
{phase:"Estrazione",text:"Riempi il serbatoio con l\u2019acqua bollente. Capovolgi."},
{phase:"Estrazione",text:"Prepara il telefono per registrare l\u2019audio. Avvia la registrazione."},
{phase:"L\u2019ascolto",text:"Ascolta senza guardare. Il gocciolio sar\u00e0 irregolare: rapido all\u2019inizio, poi pi\u00f9 lento, con pause, riprese, silenzi lunghi.",note:"L\u2019estrazione durer\u00e0 dai venti ai quaranta minuti."},
{phase:"L\u2019ascolto",text:"Presta attenzione al ritmo. Le accelerazioni, i rallentamenti, le pause. Il momento in cui il ritmo cambia."},
{phase:"L\u2019ascolto",text:"Nota l\u2019ultima goccia. Quella dopo la quale il silenzio diventa definitivo."},
{phase:"Lettura",text:"La lettura \u00e8 gi\u00e0 avvenuta. Ci\u00f2 che hai percepito durante l\u2019attesa \u2014 le percezioni sono la lettura."},
{phase:"Archivio",text:"Ferma la registrazione. Il file sonoro \u00e8 un documento oracolare. Conservalo."},
]},
{id:"incontro",num:"IV",name:"Il Caff\u00e8 dell\u2019Incontro",desc:"Due assenze si incontrano. Si beve.",
steps:[
{phase:"",text:"Un caff\u00e8 che ha superato i trenta giorni dalla tostatura non \u00e8 morto. Ha perso la voce. L\u2019individuo \u00e8 diventato categoria. Il vuoto c\u2019\u00e8, ma \u00e8 un vuoto sordo.",note:"Il Caff\u00e8 dell\u2019Incontro \u00e8 possibile solo come protesi \u2014 solo quando il caff\u00e8 ha gi\u00e0 attraversato la soglia."},
{phase:"Preparazione",text:"Pesa 35 grammi di caff\u00e8 esausto. Monorigine che \u00e8 stato buono \u2014 la sua assenza \u00e8 tanto pi\u00f9 significativa quanto pi\u00f9 la sua presenza era stata eloquente."},
{phase:"Preparazione",text:"Macina grosso. Comandante C40: 28\u201330 click."},
{phase:"Preparazione",text:"Scegli una sola aromatica. Buccia d\u2019arancia essiccata (due o tre pezzi) oppure un baccello di cardamomo verde, leggermente schiacciato.",note:"Evitare cannella, anice stellato, vaniglia. Troppo dominanti. Chiudono il discorso."},
{phase:"Preparazione",text:"Scalda 500 ml di acqua a 90\u201392\u00b0C. Non di pi\u00f9."},
{phase:"Il principio",text:"Il caff\u00e8 viene prima estratto da solo, nella sua esaustione. Le aromatiche arrivano dopo, nel liquido gi\u00e0 estratto, come ospiti brevi. Non attraversano il letto di caff\u00e8: galleggiano nel risultato per un minuto, poi se ne vanno.",note:"Questo distingue il Caff\u00e8 dell\u2019Incontro dal Caff\u00e8 Parlante, dove le aromatiche sono operaie al servizio della divinazione. Qui sono ospiti."},
{phase:"Variante I \u2014 French press",text:"Versa l\u2019acqua sul caff\u00e8 nella French press. Quattro minuti, senza aromatiche. In questi quattro minuti il caff\u00e8 \u00e8 solo con s\u00e9 stesso."},
{phase:"Variante I \u2014 French press",text:"Allo scadere dei quattro minuti, aggiungi le aromatiche. Un minuto. Premi lo stantuffo. Versa."},
{phase:"Variante II \u2014 Cuccumella classica",text:"Carica il cestello con il solo caff\u00e8 esausto, senza aromatiche. Riempi il serbatoio. Capovolgi. Estrai normalmente."},
{phase:"Variante II \u2014 Cuccumella classica",text:"Versa nella tazza. Aggiungi le aromatiche nel liquido caldo. Un minuto. Rimuovi con un cucchiaio o un colino."},
{phase:"Variante III \u2014 Cuccumella aFa",text:"Carica il cestello con il solo caff\u00e8. Assembla la cuccumella. Versa l\u2019acqua dall\u2019alto senza capovolgere. L\u2019acqua scende per gravit\u00e0."},
{phase:"Variante III \u2014 Cuccumella aFa",text:"Versa nella tazza. Aggiungi le aromatiche nel liquido. Un minuto. Rimuovi.",note:"In tutte le varianti il gesto \u00e8 lo stesso: le aromatiche entrano nel liquido gi\u00e0 estratto. Non lavorano. Passano."},
{phase:"",text:"Bevi lentamente. Il caff\u00e8 \u00e8 il letto, la spezia \u00e8 il sogno. Nessuno dei due finge di essere l\u2019altro."},
]},
];

const VOCAB=[
{term:"Densit\u00e0 e rarefazione",def:"Accumulazione vs dispersione. Macchia densa: qualcosa si \u00e8 raccolto. Rarefazione: leggerezza o esaurimento. Questa concentrazione \u00e8 risorsa o peso?"},
{term:"Centro e periferia",def:"Centro pieno: interiorit\u00e0, protezione. Bordi densi: proiezione verso fuori. Centro vuoto con bordi densi: qualcosa tiene dall\u2019esterno."},
{term:"Continuit\u00e0 e frattura",def:"Macchia continua: coerenza. Frammentata: discontinuit\u00e0 o molteplicit\u00e0. La frattura pu\u00f2 essere ferita o apertura."},
{term:"Direzione e simmetria",def:"Espansione asimmetrica: una spinta prevalente. Simmetria: equilibrio o stallo."},
{term:"Bordi netti e sfumati",def:"Il bordo \u00e8 una soglia. Netto: chiarezza tra dentro e fuori. Sfumato: permeabilit\u00e0."},
{term:"Velocit\u00e0",def:"Bordi filiformi: urgenza, impulso. Bordi compatti e rotondi: pazienza, sedimentazione."},
{term:"Residui e isole",def:"Depositi isolati: pensieri ricorrenti, possibilit\u00e0 accantonate, cose in sospeso."},
];

// COMPONENTS
function BgImages({active}){
  return e("div",{className:"bg-wrap"},
    e("img",{src:"img1.png",className:"bg-img img1"+(active===1?" active":""),alt:""}),
    e("img",{src:"img2.png",className:"bg-img img2"+(active===2?" active":""),alt:""}),
    e("div",{className:"bg-overlay"})
  );
}

function VocabOverlay({open,onClose}){
  return e("div",{className:"vocab-overlay"+(open?" open":"")},
    e("button",{className:"vocab-close",onClick:onClose},"\u00d7"),
    e("div",{className:"vocab-inner"},
      e("div",{className:"vocab-title"},"Vocabolario della lettura"),
      VOCAB.map(function(v,i){return e("div",{key:i,className:"vocab-item"},e("div",{className:"vocab-term"},v.term),e("div",{className:"vocab-def"},v.def))})
    )
  );
}

function TopBar({onBack,backLabel,onVocab,showVocab}){
  return e("div",{className:"top-bar"},
    e("button",{className:"top-back",onClick:onBack},"\u2190 "+backLabel),
    showVocab?e("button",{className:"top-vocab",onClick:onVocab},"Vocabolario"):e("div")
  );
}

function StepView({recipe,onBack}){
  var s=useState(0),idx=s[0],setIdx=s[1];
  var steps=recipe.steps,step=steps[idx];
  useEffect(function(){window.scrollTo(0,0)},[idx]);

  return e("div",{className:"step-wrap",key:idx},
    e("div",{className:"step-label"},recipe.name),
    step.phase?e("div",{className:"step-phase"},step.phase):null,
    e("div",{className:"step-text fade-in",key:"t"+idx},step.text),
    step.note?e("div",{className:"step-note fade-in",key:"n"+idx},step.note):null,
    e("div",{className:"step-nav"},
      idx>0?e("button",{onClick:function(){setIdx(idx-1)}},"\u2190 Indietro"):null,
      idx<steps.length-1?e("button",{className:"primary",onClick:function(){setIdx(idx+1)}},"\u2192 Avanti"):
        e("button",{onClick:onBack},"Fine \u2014 torna alle ricette")
    ),
    e("div",{className:"step-dots"},steps.map(function(_,i){
      return e("div",{key:i,className:"step-dot"+(i===idx?" active":"")})
    })),
    e("div",{className:"step-counter"},(idx+1)+" / "+steps.length)
  );
}

// APP
function App(){
  var vs=useState("splash"),view=vs[0],setView=vs[1];
  var rs=useState(null),recipe=rs[0],setRecipe=rs[1];
  var vo=useState(false),vocabOpen=vo[0],setVocab=vo[1];

  function goRecipe(r){setRecipe(r);setView("steps");window.scrollTo(0,0);}
  function goMenu(){setView("menu");setRecipe(null);window.scrollTo(0,0);}
  function goSplash(){setView("splash");setRecipe(null);window.scrollTo(0,0);}

  // SPLASH — img2 (sentiero col gatto) as background
  if(view==="splash"){
    return e("div",null,
      e(BgImages,{active:2}),
      e("div",{className:"splash",onClick:function(){setView("menu")}},
        e("div",{className:"splash-title"},"Caffeomanzia"),
        e("div",{className:"splash-title",style:{fontSize:"clamp(1rem,3vw,1.4rem)",letterSpacing:".2em",marginTop:4,fontWeight:300}},"Cafausica"),
        e("div",{className:"splash-sub"},"documenti"),
        e("div",{className:"splash-sep"},"\u2014 \u2022 \u2014"),
        e("div",{className:"splash-manual"},"Un manuale di pratica oracolare"),
        e("div",{className:"splash-manual"},"per caff\u00e8 che hanno perso la loro destinazione"),
        e("div",{className:"splash-credit"},"Lu Cafausu \u2014 Casa Cafausica \u2014 Fondazione Lac o Le Mon"),
        e("div",{className:"splash-enter"},"tocca per entrare")
      )
    );
  }

  // MENU — img1 (nebbia) as background
  if(view==="menu"){
    return e("div",null,
      e(BgImages,{active:1}),
      e(TopBar,{onBack:goSplash,backLabel:"Inizio",onVocab:function(){setVocab(true)},showVocab:true}),
      e("div",{className:"recipes-menu"},
        e("div",{className:"recipes-label"},"Scegli il rituale"),
        RECIPES.map(function(r,i){
          return e("div",{key:i,className:"recipe-btn",onClick:function(){goRecipe(r)}},
            e("span",{className:"recipe-btn-num"},r.num+"."),
            e("span",{className:"recipe-btn-name"},r.name),
            e("span",{className:"recipe-btn-desc"},r.desc)
          );
        })
      ),
      e(VocabOverlay,{open:vocabOpen,onClose:function(){setVocab(false)}})
    );
  }

  // STEPS — img1 (nebbia) as background
  if(view==="steps"&&recipe){
    return e("div",null,
      e(BgImages,{active:1}),
      e(TopBar,{onBack:goMenu,backLabel:"Ricette",onVocab:function(){setVocab(true)},showVocab:true}),
      e(StepView,{recipe:recipe,onBack:goMenu}),
      e(VocabOverlay,{open:vocabOpen,onClose:function(){setVocab(false)}})
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
