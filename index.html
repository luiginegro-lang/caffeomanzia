<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>Caffeomanzia Cafausica</title>
<meta name="theme-color" content="#0a0a08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a08;--text:#ddd8d0;--text2:#a09a8e;--accent:#c8a96e;--card-bg:rgba(22,22,20,.88);--border:#2a2824;--serif:'Cormorant Garamond',Georgia,serif}
html{font-size:18px}
body{background:var(--bg);color:var(--text);font-family:var(--serif);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.8}

/* BG */
.bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-img{position:absolute;inset:-8%;width:116%;height:116%;object-fit:cover;opacity:0;transition:opacity 1.8s ease}
.bg-img.active{opacity:1}
.bg-img.i1{animation:k1 30s ease-in-out infinite alternate}
.bg-img.i2{animation:k2 35s ease-in-out infinite alternate}
@keyframes k1{0%{transform:scale(1)}100%{transform:scale(1.06) translate(-1.5%,1%)}}
@keyframes k2{0%{transform:scale(1.04) translate(1%,-1%)}100%{transform:scale(1) translate(-1%,1.5%)}}
.bg-ov{position:fixed;inset:0;z-index:1;background:linear-gradient(180deg,rgba(10,10,8,.2) 0%,rgba(10,10,8,.6) 30%,rgba(10,10,8,.94) 100%)}

/* SPLASH */
.splash{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;cursor:pointer;user-select:none}
.sp-t{font-size:clamp(1.8rem,6vw,2.8rem);font-weight:300;letter-spacing:.12em;text-transform:uppercase;opacity:0;animation:fs 1.5s ease .3s forwards}
.sp-t2{font-size:clamp(1rem,3vw,1.4rem);font-weight:300;letter-spacing:.2em;text-transform:uppercase;margin-top:4px;opacity:0;animation:fs 1.5s ease .6s forwards}
.sp-sub{font-size:clamp(1.1rem,3vw,1.3rem);font-weight:300;font-style:italic;color:var(--text2);margin-top:14px;opacity:0;animation:fs 1.5s ease .9s forwards}
.sp-sep{color:var(--accent);font-size:1.1rem;letter-spacing:.5em;margin:44px 0;opacity:0;animation:fs 1s ease 1.2s forwards}
.sp-m{font-size:clamp(1rem,2.5vw,1.15rem);font-weight:300;font-style:italic;color:var(--text2);margin-bottom:8px;opacity:0;animation:fs 1.2s ease 1.5s forwards}
.sp-c{font-size:1rem;color:var(--text2);letter-spacing:.06em;margin-top:60px;opacity:0;animation:fs 1.2s ease 2s forwards}
.sp-e{position:absolute;bottom:50px;font-size:.95rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;animation:pulse 3s ease-in-out infinite}

/* MENU */
.menu{position:relative;z-index:2;min-height:100dvh;padding:80px 28px 80px;max-width:540px;margin:0 auto}
.menu-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px}
.menu-back{color:var(--accent);font-size:1rem;cursor:pointer;background:none;border:none;font-family:var(--serif);padding:8px 0}
.menu-vocab{color:var(--accent);font-size:.95rem;cursor:pointer;background:none;border:1px solid var(--border);font-family:var(--serif);padding:8px 16px;border-radius:6px}
.menu-label{font-size:1rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:24px;text-align:center;opacity:0;animation:fs .6s ease .1s forwards}
.rc{display:block;width:100%;padding:24px 24px;margin-bottom:24px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;cursor:pointer;text-align:left;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);opacity:0;animation:fs .5s ease forwards;transition:border-color .3s}
.rc:nth-child(2){animation-delay:.15s}.rc:nth-child(3){animation-delay:.25s}.rc:nth-child(4){animation-delay:.35s}.rc:nth-child(5){animation-delay:.45s}
.rc:active{border-color:var(--accent)}
.rc-num{font-size:.9rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:8px}
.rc-name{font-size:clamp(1.3rem,4vw,1.55rem);font-weight:400;color:var(--text);display:block;margin-bottom:8px}
.rc-desc{font-size:1.05rem;color:var(--text2);font-weight:300;font-style:italic;display:block}

/* STEP — full screen, tap to advance */
.step{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;padding:0;user-select:none;cursor:pointer}
.step-exit{position:fixed;top:0;left:0;right:0;z-index:10;padding:18px 28px;display:flex;justify-content:space-between;align-items:center}
.step-exit button{color:var(--accent);font-size:.95rem;cursor:pointer;background:none;border:none;font-family:var(--serif);padding:8px 0;opacity:.7;transition:opacity .3s}
.step-exit button:active{opacity:1}
.step-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 32px 100px;text-align:center;max-width:580px;margin:0 auto;width:100%}
.step-name{font-size:.95rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.step-phase{font-size:.9rem;color:var(--text2);letter-spacing:.08em;margin-bottom:32px;text-transform:uppercase}
.step-txt{font-size:clamp(1.25rem,3.8vw,1.55rem);font-weight:300;line-height:1.75;color:var(--text);opacity:0;animation:fs .45s ease forwards}
.step-note{font-size:clamp(1.05rem,2.8vw,1.2rem);color:var(--text2);font-style:italic;margin-top:24px;font-weight:300;line-height:1.7;opacity:0;animation:fs .45s ease .15s forwards}
.step-hint{position:fixed;bottom:80px;left:0;right:0;text-align:center;font-size:.85rem;color:var(--text2);opacity:.4;pointer-events:none;animation:pulse 4s ease-in-out infinite}

/* PROGRESS BAR */
.progress{position:fixed;bottom:0;left:0;right:0;z-index:10;height:3px;background:rgba(255,255,255,.06)}
.progress-fill{height:100%;background:var(--accent);transition:width .4s ease;opacity:.7}
.progress-count{position:fixed;bottom:10px;right:28px;z-index:10;font-size:.85rem;color:var(--text2);opacity:.5}

/* VOCAB */
.voc-ov{position:fixed;inset:0;background:rgba(10,10,8,.96);z-index:200;overflow-y:auto;padding:80px 28px 60px;opacity:0;pointer-events:none;transition:opacity .4s;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.voc-ov.open{opacity:1;pointer-events:auto}
.voc-x{position:fixed;top:18px;right:28px;color:var(--text2);font-size:1.8rem;cursor:pointer;z-index:210;background:none;border:none;font-family:var(--serif)}
.voc-in{max-width:600px;margin:0 auto}
.voc-t{font-size:1rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:36px;text-align:center}
.voc-i{margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid var(--border)}
.voc-i:last-child{border-bottom:none}
.voc-w{font-size:1.3rem;font-weight:500;margin-bottom:10px}
.voc-d{font-size:1.1rem;font-weight:300;color:var(--text2);line-height:1.8}

@keyframes fs{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:.6}}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
var e=React.createElement,us=React.useState,ue=React.useEffect,uc=React.useCallback;

var RECIPES=[
{id:"sacrificale",num:"I",name:"Il Caff\u00e8 Sacrificale",desc:"Lettura pura. Non si beve. Pratica solitaria.",
steps:[
{p:"Preparazione",t:"Prendi il caff\u00e8 esausto. Chicchi specialty invecchiati, buste dimenticate, lotti rifiutati. Caff\u00e8 che ha perso la sua destinazione."},
{p:"Preparazione",t:"Pesa 25 grammi di chicchi."},
{p:"Preparazione",t:"Macina medio-grosso con macinino manuale. I chicchi vecchi e fragili produrranno naturalmente fines \u2014 polvere ultrafine. Questa fragilit\u00e0 \u00e8 la risorsa della ricetta."},
{p:"Preparazione",t:"Scalda 150 ml di acqua a 90\u201395\u00b0C. Appena sotto il bollore."},
{p:"Infusione",t:"Versa l\u2019acqua calda sulla macinatura, direttamente in una tazza o ciotola."},
{p:"Infusione",t:"Copri con un piattino."},
{p:"Infusione",t:"Cinque minuti. In silenzio.",n:"Il silenzio \u00e8 parte della ricetta. Il Caff\u00e8 Sacrificale si prepara senza parlare."},
{p:"Colatura",t:"Lascia intiepidire il caff\u00e8 fino a quando \u00e8 maneggiabile."},
{p:"Colatura",t:"Prepara un foglio di carta per acquerello bianca, almeno 200 g/m\u00b2. Pi\u00f9 alta la grammatura, pi\u00f9 ricche le figure."},
{p:"Colatura",t:"Versa tutto \u2014 liquido e fondo \u2014 al centro della carta. Un gesto unico e deciso. Non distribuire. La materia si espande da sola."},
{p:"Attesa",t:"Attendi che asciughi. Da venti minuti a un\u2019ora."},
{p:"Lettura",t:"Osserva il monotipo. Densit\u00e0 e rarefazione, centro e periferia, continuit\u00e0 e frattura, bordi, velocit\u00e0, residui.",n:"Tocca \u201cVocabolario\u201d in alto per la guida alla lettura."},
{p:"Archivio",t:"Annota sul retro: la data, il caff\u00e8, una parola o frase. Conserva la carta."},
]},
{id:"parlante",num:"II",name:"Il Caff\u00e8 Parlante",desc:"Si beve e si legge. Pratica conviviale.",
steps:[
{p:"Preparazione",t:"Caff\u00e8 esausto pi\u00f9 aromatiche a scelta: scorza di limone o arancia secca, anice stellato, cannella, verbena, cardamomo, chiodi di garofano."},
{p:"Preparazione",t:"Pesa 25 grammi di caff\u00e8 e 3\u20135 grammi di aromatiche. Macina medio-grosso. Mescola."},
{p:"Preparazione",t:"Scalda 250 ml di acqua a 90\u201395\u00b0C."},
{p:"Estrazione",t:"Carica il cestello filtro della cuccumella con caff\u00e8 e aromatiche mescolati."},
{p:"Estrazione",t:"La cuccumella al contrario: non capovolgere. Versa l\u2019acqua calda direttamente nel serbatoio superiore. L\u2019acqua scende per gravit\u00e0.",n:"Il gesto fondamentale della cuccumella \u2014 rovesciare il mondo \u2014 viene sospeso."},
{p:"La doppia tazza",t:"Prima met\u00e0: filtra con carta (V60, Chemex, o filtro da supermercato su un colino). Il caff\u00e8 da bere."},
{p:"La doppia tazza",t:"Seconda met\u00e0 \u2014 pi\u00f9 densa, pi\u00f9 carica: versa in un\u2019altra tazza senza filtrare. La tazza della lettura.",n:"La carta filtrante \u00e8 la soglia che separa il piacere dalla divinazione."},
{p:"Il rito",t:"Bevete insieme la prima tazza. Parlate, state, ascoltate. Le parole dette mentre si beve sono il contesto della lettura."},
{p:"Lettura",t:"Il consultante beve lentamente la seconda tazza fino all\u2019ultimo terzo. Capovolgi sul piattino. Tre-cinque minuti."},
{p:"Lettura",t:"Leggi a voce, in dialogo. Descrivi le relazioni spaziali, le densit\u00e0, i vuoti. Chi consulta risponde.",n:"Figure fatte pi\u00f9 di assenza che di presenza."},
]},
{id:"soglia",num:"III",name:"Il Caff\u00e8 della Soglia",desc:"La lettura \u00e8 nel tempo. Pratica dell\u2019ascolto.",
steps:[
{p:"Preparazione",t:"Caff\u00e8 esausto pi\u00f9 un ingrediente secco: buccia d\u2019arancia secca a pezzetti, fiori di camomilla, cardamomo frantumato, o petali di rosa secchi."},
{p:"Preparazione",t:"Pesa 25 grammi di caff\u00e8 e 5\u20138 grammi di materiale secco. Macina medio-fine."},
{p:"Preparazione",t:"Scalda 200 ml di acqua fino al bollore, 100\u00b0C."},
{p:"Estrazione",t:"Carica il cestello con caff\u00e8 e materiale secco mescolati, ben pressati. Riempi il serbatoio. Capovolgi."},
{p:"Estrazione",t:"Prepara il telefono. Avvia la registrazione audio."},
{p:"L\u2019ascolto",t:"Ascolta senza guardare. Il gocciolio sar\u00e0 irregolare: rapido all\u2019inizio, poi pi\u00f9 lento, con pause, silenzi lunghi.",n:"L\u2019estrazione durer\u00e0 dai venti ai quaranta minuti."},
{p:"L\u2019ascolto",t:"Presta attenzione al ritmo. Le accelerazioni, i rallentamenti, le pause. Il momento in cui cambia."},
{p:"L\u2019ascolto",t:"Nota l\u2019ultima goccia. Quella dopo la quale il silenzio diventa definitivo."},
{p:"Lettura",t:"La lettura \u00e8 gi\u00e0 avvenuta. Le percezioni durante l\u2019attesa sono la lettura."},
{p:"Archivio",t:"Ferma la registrazione. Il file sonoro \u00e8 un documento oracolare. Conservalo."},
]},
{id:"incontro",num:"IV",name:"Il Caff\u00e8 dell\u2019Incontro",desc:"Due assenze si incontrano. Si beve.",
steps:[
{p:"",t:"Un caff\u00e8 che ha superato i trenta giorni dalla tostatura non \u00e8 morto. Ha perso la voce. L\u2019individuo \u00e8 diventato categoria.",n:"Il Caff\u00e8 dell\u2019Incontro \u00e8 possibile solo come protesi \u2014 solo quando il caff\u00e8 ha gi\u00e0 attraversato la soglia."},
{p:"Preparazione",t:"Pesa 35 grammi di caff\u00e8 esausto. Monorigine che \u00e8 stato buono \u2014 la sua assenza \u00e8 tanto pi\u00f9 significativa quanto pi\u00f9 la sua presenza era stata eloquente."},
{p:"Preparazione",t:"Macina grosso. Comandante C40: 28\u201330 click. Scalda 500 ml di acqua a 90\u201392\u00b0C."},
{p:"Preparazione",t:"Scegli una sola aromatica. Buccia d\u2019arancia essiccata (due o tre pezzi) oppure un baccello di cardamomo verde, leggermente schiacciato.",n:"Evitare cannella, anice stellato, vaniglia. Troppo dominanti."},
{p:"Il principio",t:"Il caff\u00e8 viene estratto da solo, nella sua esaustione. Le aromatiche arrivano dopo, nel liquido gi\u00e0 estratto, come ospiti brevi. Non lavorano. Passano.",n:"Nel Caff\u00e8 Parlante le aromatiche sono operaie. Qui sono ospiti."},
{p:"Variante I \u2014 French press",t:"Versa l\u2019acqua sul caff\u00e8 nella French press. Quattro minuti senza aromatiche. Poi aggiungi le aromatiche. Un minuto. Premi lo stantuffo. Versa."},
{p:"Variante II \u2014 Cuccumella classica",t:"Cestello con solo caff\u00e8. Riempi il serbatoio. Capovolgi. Estrai. Versa nella tazza. Aggiungi le aromatiche nel liquido caldo. Un minuto. Rimuovi."},
{p:"Variante III \u2014 Cuccumella aFa",t:"Cestello con solo caff\u00e8. Versa l\u2019acqua dall\u2019alto senza capovolgere. Versa nella tazza. Aggiungi le aromatiche. Un minuto. Rimuovi.",n:"In tutte le varianti: le aromatiche entrano nel liquido gi\u00e0 estratto. Un fantasma, non una presenza piena."},
{p:"",t:"Bevi lentamente. Il caff\u00e8 \u00e8 il letto, la spezia \u00e8 il sogno. Nessuno dei due finge di essere l\u2019altro."},
]},
];

var VOCAB=[
{w:"Densit\u00e0 e rarefazione",d:"Macchia densa: qualcosa si \u00e8 raccolto. Rarefazione: leggerezza o esaurimento. Questa concentrazione \u00e8 risorsa o peso?"},
{w:"Centro e periferia",d:"Centro pieno: interiorit\u00e0, protezione. Bordi densi: proiezione verso fuori. Centro vuoto con bordi densi: qualcosa tiene dall\u2019esterno."},
{w:"Continuit\u00e0 e frattura",d:"Macchia continua: coerenza. Frammentata: discontinuit\u00e0 o molteplicit\u00e0. Ferita o apertura."},
{w:"Direzione e simmetria",d:"Espansione asimmetrica: una spinta prevalente. Simmetria: equilibrio o stallo."},
{w:"Bordi netti e sfumati",d:"Il bordo \u00e8 una soglia. Netto: chiarezza. Sfumato: permeabilit\u00e0."},
{w:"Velocit\u00e0",d:"Bordi filiformi: urgenza. Bordi compatti: pazienza, sedimentazione."},
{w:"Residui e isole",d:"Depositi isolati: pensieri ricorrenti, possibilit\u00e0 accantonate, cose in sospeso."},
];

function Bg(props){
  return e("div",{className:"bg-wrap"},
    e("img",{src:"img1.png",className:"bg-img i1"+(props.a===1?" active":""),alt:""}),
    e("img",{src:"img2.png",className:"bg-img i2"+(props.a===2?" active":""),alt:""}),
    e("div",{className:"bg-ov"})
  );
}

function Vocab(props){
  return e("div",{className:"voc-ov"+(props.o?" open":"")},
    e("button",{className:"voc-x",onClick:props.c},"\u00d7"),
    e("div",{className:"voc-in"},
      e("div",{className:"voc-t"},"Vocabolario della lettura"),
      VOCAB.map(function(v,i){return e("div",{key:i,className:"voc-i"},e("div",{className:"voc-w"},v.w),e("div",{className:"voc-d"},v.d))})
    )
  );
}

function StepView(props){
  var r=props.recipe,s=us(0),idx=s[0],set=s[1];
  var steps=r.steps,step=steps[idx],len=steps.length;
  var pct=((idx+1)/len)*100;

  // Touch handling for swipe back
  var tx=React.useRef(0);
  function onTS(ev){tx.current=ev.touches[0].clientX}
  function onTE(ev){
    var dx=ev.changedTouches[0].clientX-tx.current;
    if(dx>80&&idx>0) set(idx-1);
    else if(dx<-80&&idx<len-1) set(idx+1);
  }

  function advance(ev){
    // Don't advance if they tapped a button
    if(ev.target.tagName==="BUTTON") return;
    if(idx<len-1) set(idx+1);
  }

  ue(function(){window.scrollTo(0,0)},[idx]);

  return e("div",{className:"step",onClick:advance,onTouchStart:onTS,onTouchEnd:onTE},
    e("div",{className:"step-exit"},
      e("button",{onClick:function(ev){ev.stopPropagation();props.back()}},"\u2190 Ricette"),
      e("button",{onClick:function(ev){ev.stopPropagation();props.vocab()}},"Vocabolario")
    ),
    e("div",{className:"step-body"},
      e("div",{className:"step-name"},r.name),
      step.p?e("div",{className:"step-phase"},step.p):null,
      e("div",{className:"step-txt",key:"t"+idx},step.t),
      step.n?e("div",{className:"step-note",key:"n"+idx},step.n):null,
      idx<len-1?e("div",{className:"step-hint"},"tocca per avanzare"):
        e("div",{className:"step-hint",style:{opacity:.6,color:"var(--accent)"}},"fine del rituale \u2014 tocca per tornare")
    ),
    e("div",{className:"progress"},e("div",{className:"progress-fill",style:{width:pct+"%"}})),
    e("div",{className:"progress-count"},(idx+1)+" / "+len),
    idx===len-1?e("div",{style:{position:"fixed",bottom:40,left:0,right:0,textAlign:"center",zIndex:10},
      onClick:function(ev){ev.stopPropagation();props.back()}},
      e("div",{style:{color:"var(--accent)",fontSize:"1rem",cursor:"pointer",opacity:.7}},"Torna alle ricette")):null
  );
}

function App(){
  var vs=us("splash"),view=vs[0],sv=vs[1];
  var rs=us(null),rec=rs[0],sr=rs[1];
  var vo=us(false),voc=vo[0],svo=vo[1];

  function goR(r){sr(r);sv("steps")}
  function goM(){sv("menu");sr(null)}

  if(view==="splash")return e("div",null,
    e(Bg,{a:2}),
    e("div",{className:"splash",onClick:function(){sv("menu")}},
      e("div",{className:"sp-t"},"Caffeomanzia"),
      e("div",{className:"sp-t2"},"Cafausica"),
      e("div",{className:"sp-sub"},"documenti"),
      e("div",{className:"sp-sep"},"\u2014 \u2022 \u2014"),
      e("div",{className:"sp-m"},"Un manuale di pratica oracolare"),
      e("div",{className:"sp-m"},"per caff\u00e8 che hanno perso la loro destinazione"),
      e("div",{className:"sp-c"},"Lu Cafausu \u2014 Casa Cafausica \u2014 Fondazione Lac o Le Mon"),
      e("div",{className:"sp-e"},"tocca per entrare")
    )
  );

  if(view==="menu")return e("div",null,
    e(Bg,{a:1}),
    e("div",{className:"menu"},
      e("div",{className:"menu-top"},
        e("button",{className:"menu-back",onClick:function(){sv("splash")}},"\u2190 Inizio"),
        e("button",{className:"menu-vocab",onClick:function(){svo(true)}},"Vocabolario")
      ),
      e("div",{className:"menu-label"},"Scegli il rituale"),
      RECIPES.map(function(r,i){
        return e("div",{key:i,className:"rc",onClick:function(){goR(r)}},
          e("span",{className:"rc-num"},r.num+"."),
          e("span",{className:"rc-name"},r.name),
          e("span",{className:"rc-desc"},r.desc)
        );
      })
    ),
    e(Vocab,{o:voc,c:function(){svo(false)}})
  );

  if(view==="steps"&&rec)return e("div",null,
    e(Bg,{a:1}),
    e(StepView,{recipe:rec,back:goM,vocab:function(){svo(true)}}),
    e(Vocab,{o:voc,c:function(){svo(false)}})
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
