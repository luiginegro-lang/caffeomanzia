<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>Caffeomanzia Cafausica</title>
<meta name="theme-color" content="#0a0a08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a08;--text:#ddd8d0;--text2:#a09a8e;--accent:#c8a96e;--card:rgba(22,22,20,.88);--brd:#2a2824;--f:'Cormorant Garamond',Georgia,serif}
html{font-size:18px}
body{background:var(--bg);color:var(--text);font-family:var(--f);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.8}

.bg-w{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-i{position:absolute;inset:-8%;width:116%;height:116%;object-fit:cover;opacity:0;transition:opacity 1.8s}
.bg-i.on{opacity:1}
.bg-i.i1{animation:k1 30s ease-in-out infinite alternate}
.bg-i.i2{animation:k2 35s ease-in-out infinite alternate}
@keyframes k1{0%{transform:scale(1)}100%{transform:scale(1.06) translate(-1.5%,1%)}}
@keyframes k2{0%{transform:scale(1.04) translate(1%,-1%)}100%{transform:scale(1) translate(-1%,1.5%)}}
.bg-o{position:fixed;inset:0;z-index:1;background:linear-gradient(180deg,rgba(10,10,8,.2) 0%,rgba(10,10,8,.6) 30%,rgba(10,10,8,.94) 100%)}

/* SPLASH */
.splash{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;cursor:pointer;user-select:none}
.s1{font-size:clamp(1.8rem,6vw,2.8rem);font-weight:300;letter-spacing:.12em;text-transform:uppercase;opacity:0;animation:fs 1.5s ease .3s forwards}
.s2{font-size:clamp(1rem,3vw,1.4rem);font-weight:300;letter-spacing:.2em;text-transform:uppercase;margin-top:4px;opacity:0;animation:fs 1.5s ease .6s forwards}
.s3{font-size:clamp(1.1rem,3vw,1.3rem);font-weight:300;font-style:italic;color:var(--text2);margin-top:14px;opacity:0;animation:fs 1.5s ease .9s forwards}
.s4{color:var(--accent);font-size:1.1rem;letter-spacing:.5em;margin:44px 0;opacity:0;animation:fs 1s ease 1.2s forwards}
.s5{font-size:clamp(1rem,2.5vw,1.15rem);font-weight:300;font-style:italic;color:var(--text2);margin-bottom:8px;opacity:0;animation:fs 1.2s ease 1.5s forwards}
.s6{font-size:1rem;color:var(--text2);letter-spacing:.06em;margin-top:60px;opacity:0;animation:fs 1.2s ease 2s forwards}
.s7{position:absolute;bottom:50px;font-size:.95rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;animation:pulse 3s ease-in-out infinite}

/* MENU */
.menu{position:relative;z-index:2;padding:60px 28px 120px;max-width:540px;margin:0 auto}
.menu-h{font-size:1rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:28px;text-align:center;opacity:0;animation:fs .6s ease .1s forwards}
.rc{display:block;width:100%;padding:26px 24px;margin-bottom:20px;background:var(--card);border:1px solid var(--brd);border-radius:12px;cursor:pointer;text-align:left;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);opacity:0;animation:fs .5s ease forwards;transition:border-color .3s;min-height:88px}
.rc:nth-child(2){animation-delay:.12s}.rc:nth-child(3){animation-delay:.2s}.rc:nth-child(4){animation-delay:.28s}.rc:nth-child(5){animation-delay:.36s}
.rc:active{border-color:var(--accent)}
.rc-n{font-size:.9rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:8px}
.rc-t{font-size:clamp(1.3rem,4vw,1.55rem);font-weight:400;color:var(--text);display:block;margin-bottom:8px}
.rc-d{font-size:1.05rem;color:var(--text2);font-weight:300;font-style:italic;display:block}

/* MENU BOTTOM SECTION — read manual link */
.menu-sep{text-align:center;color:var(--accent);letter-spacing:.5em;margin:36px 0 28px;font-size:.9rem;opacity:0;animation:fs .6s ease .5s forwards}
.menu-read{display:block;width:100%;padding:22px 24px;background:transparent;border:1px solid var(--brd);border-radius:12px;cursor:pointer;text-align:center;opacity:0;animation:fs .5s ease .55s forwards;transition:border-color .3s}
.menu-read:active{border-color:var(--accent)}
.menu-read-t{font-size:clamp(1.1rem,3vw,1.25rem);font-weight:400;color:var(--text);display:block;margin-bottom:4px}
.menu-read-d{font-size:1rem;color:var(--text2);font-weight:300;font-style:italic}

/* BOTTOM BAR — always in thumb zone */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(10,10,8,.9);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-top:1px solid var(--brd);padding:12px 24px 28px;display:flex;align-items:center;justify-content:space-between}
.bbar button{background:none;border:none;color:var(--accent);font-family:var(--f);font-size:1.05rem;cursor:pointer;padding:10px 16px;border-radius:8px;transition:background .2s;min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center}
.bbar button:active{background:rgba(200,169,110,.12)}
.bbar button.dim{color:var(--text2);opacity:.4}
.bbar-center{display:flex;align-items:center;gap:12px}
.bbar-label{font-size:.95rem;color:var(--text2);white-space:nowrap}

/* STEP */
.step{position:relative;z-index:2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px 120px;text-align:center;max-width:580px;margin:0 auto;user-select:none;cursor:pointer}
.st-name{font-size:.95rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.st-phase{font-size:.9rem;color:var(--text2);letter-spacing:.08em;margin-bottom:32px;text-transform:uppercase}
.st-txt{font-size:clamp(1.25rem,3.8vw,1.55rem);font-weight:300;line-height:1.75;opacity:0;animation:fs .4s ease forwards}
.st-note{font-size:clamp(1.05rem,2.8vw,1.2rem);color:var(--text2);font-style:italic;margin-top:24px;font-weight:300;line-height:1.7;opacity:0;animation:fs .4s ease .12s forwards}
.st-hint{margin-top:40px;font-size:.9rem;color:var(--text2);opacity:.35}

/* PROGRESS — thin line above bottom bar */
.prog{position:fixed;bottom:68px;left:0;right:0;z-index:51;height:2px;background:rgba(255,255,255,.05)}
.prog-f{height:100%;background:var(--accent);transition:width .4s;opacity:.6}

/* READ VIEW */
.read{position:relative;z-index:2;padding:40px 28px 120px;max-width:660px;margin:0 auto}
.read h2{font-size:clamp(1.35rem,4vw,1.7rem);font-weight:400;margin:2.5em 0 1em;line-height:1.3;color:var(--text)}
.read h2:first-of-type{margin-top:.5em}
.read h3{font-size:clamp(1.1rem,3vw,1.3rem);font-weight:500;margin:2em 0 .8em}
.read p{font-size:clamp(1.05rem,2.5vw,1.2rem);margin-bottom:1.4em;font-weight:300;line-height:1.85}
.read .it{font-style:italic;color:var(--text2)}
.read .sep{text-align:center;color:var(--accent);letter-spacing:.5em;margin:2em 0}
.read .bl{font-weight:500}
.read .cred{text-align:center;font-style:italic;color:var(--text2);font-size:1rem;margin-top:3em}

/* VOCAB */
.vov{position:fixed;inset:0;background:rgba(10,10,8,.96);z-index:200;overflow-y:auto;padding:80px 28px 100px;opacity:0;pointer-events:none;transition:opacity .35s;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.vov.on{opacity:1;pointer-events:auto}
.vo-x{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:210;background:var(--card);border:1px solid var(--brd);color:var(--accent);font-family:var(--f);font-size:1rem;padding:12px 32px;border-radius:8px;cursor:pointer}
.vo-t{font-size:1rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:36px;text-align:center}
.vo-i{margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--brd)}
.vo-i:last-child{border-bottom:none}
.vo-w{font-size:1.25rem;font-weight:500;margin-bottom:8px}
.vo-d{font-size:1.1rem;font-weight:300;color:var(--text2);line-height:1.8}

@keyframes fs{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:.6}}
</style>
</head>

{t:"I. Genealogia di una pratica",ps:[
"La caffeomanzia \u00e8 antica quanto il caff\u00e8. La tradizione yemenita, araba, turca e greca della lettura dei fondi \u2014 tasseografia, dal francese tasse, tazza \u2014 risale almeno al XVI secolo. Il metodo \u00e8 semplice: si beve un caff\u00e8 preparato senza filtrazione, si capovolge la tazza sul piattino, si attende che i fondi formino figure, e si legge.",
"La caffeomanzia cafausica parte da qui ma diverge radicalmente, per tre ragioni.",
"La prima \u00e8 il mezzo. La cuccumella, il filtro manuale, la moka producono caff\u00e8 filtrato. I fondi restano nel cestello. Nella tazza arriva un liquido pulito. La caffeomanzia classica diventa fisicamente impossibile: manca la materia.",
"La seconda \u00e8 la materia prima. La caffeomanzia cafausica utilizza esclusivamente caff\u00e8 esausto \u2014 chicchi invecchiati, buste dimenticate, lotti rifiutati. Caff\u00e8 che il mercato ha dichiarato finito. Ci\u00f2 che \u00e8 stato scartato trova una funzione diversa, una seconda vita che \u00e8 una vita altra.",
"La terza \u00e8 il metodo di lettura. La caffeomanzia tradizionale opera per riconoscimento di figure. La caffeomanzia cafausica legge la materia nella sua materialit\u00e0: densit\u00e0 e rarefazione, centro e periferia, continuit\u00e0 e frattura. Pi\u00f9 vicino alla psicoanalisi che alla chiromanzia.",
]},
{t:"Il caff\u00e8 come soglia",ps:[

"Il caff\u00e8 esausto \u2014 quello che ha gi\u00e0 attraversato tutte le sue soglie utili \u2014 compie un ultimo attraversamento. La sua esaustione \u00e8 la condizione della sua trasformazione in medium. Ci\u00f2 che non serve pi\u00f9 a niente serve a qualcosa che niente altro potrebbe fare.",
]},
{t:"Una lettura contemporanea",ps:[

]},
{t:"La dimensione politica",ps:[

]},
{t:"II. Il metodo di lettura",ps:[
"1. Si legge la relazione, non la figura. Come sta questa materia nello spazio? Dove si \u00e8 concentrata? Dove ha lasciato vuoto?",
"2. Il vuoto \u00e8 il testo principale. Lo spazio bianco che il caff\u00e8 ha lasciato libero. Il vuoto come potenzialit\u00e0.",
"3. La lettura \u00e8 dialogica. Avviene come conversazione tra chi legge e chi consulta. Il caff\u00e8 non predice il futuro. Rende visibile il presente.",
"4. La carta \u00e8 un archivio. Un monotipo unico, irripetibile, databile. Le carte si conservano. Nel tempo formano un diario cafausico.",

]},
{t:"V. Il Caff\u00e8 dell\u2019Incontro",ps:[
"Un caff\u00e8 monorigine specialty, trenta-quarantacinque giorni dopo la tostatura, non \u00e8 morto. \u00c8 in senescenza avanzata. I composti volatili leggeri sono evaporati o ossidati. Quello che resta \u00e8 lo scheletro: melanoidini, caffeina, una struttura di corpo. Ha perso la sua firma. L\u2019individuo \u00e8 diventato categoria.",
"La metafora giusta non \u00e8 la morte. \u00c8 la perdita di identit\u00e0. Il chicco c\u2019\u00e8 ancora, la voce no. Il vuoto c\u2019\u00e8, ma \u00e8 un vuoto sordo \u2014 senza la sua potenzialit\u00e0.",

"Il Caff\u00e8 dell\u2019Incontro \u00e8 possibile solo come protesi. Allora la spezia non colonizza: incontra. Il caff\u00e8 offre il corpo senza pretendere di avere ancora una voce. Le aromatiche offrono una voce senza pretendere di avere un corpo. Il caff\u00e8 \u00e8 il letto, la spezia \u00e8 il sogno.",

"La caffeomanzia cafausica \u00e8 un sistema autonomo. Pu\u00f2 coesistere con i tarocchi, i Messaggi di Ventura, l\u2019I Ching \u2014 ma opera come una porta separata.",

];

// COMPONENTS
function Bg(p){return h("div",{className:"bg-w"},h("img",{src:"img1.png",className:"bg-i i1"+(p.a===1?" on":""),alt:""}),h("img",{src:"img2.png",className:"bg-i i2"+(p.a===2?" on":""),alt:""}),h("div",{className:"bg-o"}))}

function Voc(p){return h("div",{className:"vov"+(p.o?" on":"")},
  h("div",{style:{maxWidth:600,margin:"0 auto"}},
    h("div",{className:"vo-t"},"Vocabolario della lettura"),
    VV.map(function(v,i){return h("div",{key:i,className:"vo-i"},h("div",{className:"vo-w"},v.w),h("div",{className:"vo-d"},v.d))}),
  ),
  h("button",{className:"vo-x",onClick:p.c},"Chiudi vocabolario")
)}

function BBar(p){
  return h("div",{className:"bbar"},
    h("button",{onClick:p.left,className:p.leftDim?"dim":""},p.leftLabel||"\u2190"),
    h("div",{className:"bbar-center"},
      h("span",{className:"bbar-label"},p.center)
    ),
    h("button",{onClick:p.right},p.rightLabel||"\u2192")
  );
}

function Steps(p){
  var r=p.recipe,idx=us(0),i=idx[0],si=idx[1];
  var ss=r.ss,s=ss[i],len=ss.length,pct=((i+1)/len)*100;
  var tx=ur(0);

  function prev(){if(i>0)si(i-1)}
  function next(){if(i<len-1)si(i+1);else p.back()}
  function tap(ev){if(ev.target.tagName!=="BUTTON")next()}
  function ts(ev){tx.current=ev.touches[0].clientX}
  function te(ev){var d=ev.changedTouches[0].clientX-tx.current;if(d>70)prev();else if(d<-70)next()}

  ue(function(){window.scrollTo(0,0)},[i]);

  return h("div",null,
    h("div",{className:"step",onClick:tap,onTouchStart:ts,onTouchEnd:te,key:i},
      h("div",{className:"st-name"},r.nm),
      s.p?h("div",{className:"st-phase"},s.p):null,
      h("div",{className:"st-txt",key:"t"+i},s.t),
      s.n?h("div",{className:"st-note",key:"n"+i},s.n):null,
      i<len-1?h("div",{className:"st-hint"},"tocca per avanzare"):h("div",{className:"st-hint",style:{color:"var(--accent)",opacity:.5}},"fine del rituale")
    ),
    h("div",{className:"prog"},h("div",{className:"prog-f",style:{width:pct+"%"}})),
    h(BBar,{
      left:function(){p.back()},leftLabel:"\u2190 Ricette",leftDim:false,
      center:(i+1)+" / "+len,
      right:i<len-1?next:p.back,rightLabel:i<len-1?"Avanti \u2192":"Fine"
    })
  );
}

function ReadView(p){
  return h("div",{className:"read"},
    RDOC.map(function(sec,si){return h("div",{key:si},
      h("h2",null,sec.t),
      sec.ps.map(function(txt,pi){return h("p",{key:pi},txt)})
    )}),
    h("div",{className:"cred"},"Lu Cafausu \u2014 Casa Cafausica \u2014 Fondazione Lac o Le Mon"),
    h(BBar,{left:p.back,leftLabel:"\u2190 Ricette",center:"",right:p.vocab,rightLabel:"Vocabolario"})
  );
}

function App(){
  var vs=us("splash"),v=vs[0],sv=vs[1];
  var rs=us(null),rc=rs[0],sr=rs[1];
  var vo=us(false),voc=vo[0],svo=vo[1];

  function goR(r){sr(r);sv("steps")}
  function goM(){sv("menu");sr(null);window.scrollTo(0,0)}

  if(v==="splash")return h("div",null,
    h(Bg,{a:2}),
    h("div",{className:"splash",onClick:function(){sv("menu")}},
      h("div",{className:"s1"},"Caffeomanzia"),
      h("div",{className:"s2"},"Cafausica"),
      h("div",{className:"s3"},"documenti"),
      h("div",{className:"s4"},"\u2014 \u2022 \u2014"),
      h("div",{className:"s5"},"Un manuale di pratica oracolare"),
      h("div",{className:"s5"},"per caff\u00e8 che hanno perso la loro destinazione"),
      h("div",{className:"s6"},"Lu Cafausu \u2014 Casa Cafausica \u2014 Fondazione Lac o Le Mon"),
      h("div",{className:"s7"},"tocca per entrare")
    )
  );

  if(v==="menu")return h("div",null,
    h(Bg,{a:1}),
    h("div",{className:"menu"},
      h("div",{className:"menu-h"},"Scegli il rituale"),
      RR.map(function(r,i){return h("div",{key:i,className:"rc",onClick:function(){goR(r)}},
        h("span",{className:"rc-n"},r.num+"."),
        h("span",{className:"rc-t"},r.nm),
        h("span",{className:"rc-d"},r.ds)
      )}),
      h("div",{className:"menu-sep"},"\u2014 \u2022 \u2014"),
      h("div",{className:"menu-read",onClick:function(){sv("read");window.scrollTo(0,0)}},
        h("span",{className:"menu-read-t"},"Leggi il manuale"),
        h("span",{className:"menu-read-d"},"Genealogia, metodo di lettura, vocabolario, note")
      )
    ),
    h(BBar,{left:function(){sv("splash")},leftLabel:"\u2190 Inizio",center:"",right:function(){svo(true)},rightLabel:"Vocabolario"}),
    h(Voc,{o:voc,c:function(){svo(false)}})
  );

  if(v==="steps"&&rc)return h("div",null,
    h(Bg,{a:1}),
    h(Steps,{recipe:rc,back:goM,vocab:function(){svo(true)}}),
    h(Voc,{o:voc,c:function(){svo(false)}})
  );

  if(v==="read")return h("div",null,
    h(Bg,{a:1}),
    h(ReadView,{back:goM,vocab:function(){svo(true)}}),
    h(Voc,{o:voc,c:function(){svo(false)}})
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
